<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GeoStyler Web Component</title>
    <link rel="stylesheet" href="https://unpkg.com/ol@10.6.1/ol.css" />
    <script type="module" src="./dist/geostyler-web-component.js"></script>
    <script src="https://unpkg.com/ol@10.6.1/dist/ol.js"></script>
    <style>
      :root {
        --bg: #f5f7f6;
        --panel: #ffffff;
        --text: #1f2a2a;
        --muted: #5a6a69;
        --line: #d5dfdd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(
          circle at top right,
          #eaf0ee,
          var(--bg) 45%
        );
        color: var(--text);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
        padding: 16px;
      }

      .topbar {
        padding: 8px 4px;
      }

      h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .editor {
        position: relative;
        height: 100%;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
      }

      .workspace {
        display: grid;
        grid-template-rows: 1fr 1fr;
        gap: 12px;
        height: 78vh;
      }

      .map-panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      .loading-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.75);
        align-items: center;
        justify-content: center;
        z-index: 10;
        border-radius: 10px;
      }

      .loading-overlay.visible {
        display: flex;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--line);
        border-top-color: #2f7f77;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      geostyler-style-wc {
        display: block;
        width: 100%;
        height: 100%;
      }

      .error-banner {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        background: #fff5f5;
        border: 1px solid #f5c2c2;
        border-radius: 8px;
        color: #7f1d1d;
        font-size: 0.875rem;
      }

      .error-banner.visible {
        display: flex;
      }

      .error-banner strong {
        flex-shrink: 0;
      }

      @media (max-width: 700px) {
        .app {
          padding: 12px;
        }

        .workspace {
          grid-template-rows: 1fr 1fr;
          height: 82vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1>GeoStyler Playground</h1>
        <p class="subtitle">Minimal page layout for the web component</p>
      </header>

      <div
        class="error-banner"
        id="error-banner"
        role="alert"
        aria-live="polite"
      >
        <strong>Error:</strong>
        <span id="error-message"></span>
      </div>

      <main class="workspace">
        <section class="editor">
          <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
          </div>
          <geostyler-style-wc
            id="styler"
            debounce-ms="300"
          ></geostyler-style-wc>
        </section>

        <section class="map-panel" aria-label="OpenLayers map preview">
          <div id="map"></div>
        </section>
      </main>
    </div>

    <script type="module">
      import OlStyleParser from 'https://esm.sh/geostyler-openlayers-parser@5.7.0';

      const styler = document.getElementById('styler');
      const loading = document.getElementById('loading');
      const errorBanner = document.getElementById('error-banner');
      const errorMessage = document.getElementById('error-message');

      const data = {
        type: 'FeatureCollection',
        features: [
          {
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [-71.252712, 46.793560] },
            properties: { name: 'Québec' }
          },
                    {
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [-71.185421, 46.765817] },
            properties: { name: 'Lévis' }
          }
        ]
      };

      const vectorLayer = new ol.layer.Vector({
        source: new ol.source.Vector({
        features: new ol.format.GeoJSON().readFeatures(data, {
              dataProjection: 'EPSG:4326',
              featureProjection: 'EPSG:3857'
            }),
          })
      });



      const map = new ol.Map({
        target: 'map',
        layers: [
          new ol.layer.Tile({
            source: new ol.source.OSM()
          }),
          vectorLayer
        ],
        view: new ol.View({
          center: ol.proj.fromLonLat([-71.196064, 46.808366]),
          zoom: 10
        })
      });

      const styleParser = new OlStyleParser(ol);

      async function applyGeoStylerStyle(style) {
        try {
          const result = await styleParser.writeStyle(style);
          if (result.errors?.length) {
            throw result.errors[0];
          }
          vectorLayer.setStyle(result.output);
        } catch (err) {
          errorMessage.textContent = err?.message ?? String(err);
          errorBanner.classList.add('visible');
        }
      }

      styler.addEventListener('gs-style-change', (event) => {
        applyGeoStylerStyle(event.detail);
      });

      styler.addEventListener('gs-parsing', (e) => {
        loading.classList.toggle('visible', e.detail);
        if (e.detail) {
          errorBanner.classList.remove('visible');
        }
      });

      styler.addEventListener('gs-parse-error', (e) => {
        errorMessage.textContent = e.detail?.message ?? String(e.detail);
        errorBanner.classList.add('visible');
      });

      styler.addEventListener('gs-warning', (e) => {
        console.warn('[geostyler-style-wc]', e.detail);
      });


      const geostylerStyle = {
        name: 'minimal-style',
        rules: [
          {
            name: 'point-rule',
            symbolizers: [
              {
                kind: 'Mark',
                wellKnownName: 'circle',
                radius: 8,
                color: '#2f7f77',
                fillOpacity: 0.85,
                strokeColor: '#0e2f2b',
                strokeWidth: 1
              }
            ]
          }
        ]
      };

      customElements.whenDefined('geostyler-style-wc').then(() => {
        if (!styler) return;
        styler.data = data;
        styler.geostylerStyle = geostylerStyle;
        applyGeoStylerStyle(geostylerStyle);
      });
    </script>
  </body>
</html>
