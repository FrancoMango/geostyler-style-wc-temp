<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GeoStyler Web Component</title>
    <script type="module" src="./dist/geostyler-web-component.js"></script>
    <style>
      :root {
        --bg: #f5f7f6;
        --panel: #ffffff;
        --text: #1f2a2a;
        --muted: #5a6a69;
        --line: #d5dfdd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(
          circle at top right,
          #eaf0ee,
          var(--bg) 45%
        );
        color: var(--text);
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
        padding: 16px;
      }

      .topbar {
        padding: 8px 4px;
      }

      h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .editor {
        height: 70vh;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        overflow: hidden;
      }

      geostyler-style-wc {
        display: block;
        width: 100%;
        height: 100%;
      }

      @media (max-width: 700px) {
        .app {
          padding: 12px;
        }

        .editor {
          height: 78vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1>GeoStyler Playground</h1>
        <p class="subtitle">Minimal page layout for the web component</p>
      </header>

      <main class="editor">
        <geostyler-style-wc id="styler" debounce-ms="300"></geostyler-style-wc>
      </main>
    </div>

    <script type="module">
      const styler = document.getElementById('styler');

      const data = {
        type: 'FeatureCollection',
        features: [
          {
            type: 'Feature',
            geometry: { type: 'Point', coordinates: [2.35, 48.85] },
            properties: { name: 'Paris' }
          }
        ]
      };

      const geostylerStyle = {
        name: 'minimal-style',
        rules: [
          {
            name: 'point-rule',
            symbolizers: [
              {
                kind: 'Mark',
                wellKnownName: 'Circle',
                radius: 8,
                color: '#2f7f77',
                fillOpacity: 0.85,
                strokeColor: '#0e2f2b',
                strokeWidth: 1
              }
            ]
          }
        ]
      };

      customElements.whenDefined('geostyler-style-wc').then(() => {
        if (!styler) return;
        styler.data = data;
        styler.geostylerStyle = geostylerStyle;
      });
    </script>
  </body>
</html>
